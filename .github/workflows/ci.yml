name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build
      env:
        # Mocking environment variables required for build-time static generation
        NEXT_PUBLIC_CONVEX_URL: "https://mock-url.convex.cloud"
        NEXT_PUBLIC_APP_URL: "http://localhost:3000"
