# Industrial-Grade Kubernetes Orchestration
# Designed for High-Availability and Resource Efficiency

apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-os
  labels:
    app: portfolio-os
    tier: frontend
spec:
  replicas: 3 # High availability: 3 replicas across nodes
  selector:
    matchLabels:
      app: portfolio-os
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: portfolio-os
    spec:
      containers:
      - name: portfolio
        image: ghcr.io/chaitanya299/portfolio-os:latest # Target image
        ports:
        - containerPort: 3000

        # Production Resource Constraints
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"

        # Self-Healing & Availability Checks
        livenessProbe:
          httpGet:
            path: /api/me
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/me
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5

        # Security Context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false

        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_APP_URL
          value: "https://saichaitanyadev.vercel.app"

---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-os-service
spec:
  selector:
    app: portfolio-os
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
